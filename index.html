<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body {
    background:black;
    color:white;
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#111827;
    padding:20px;
    border-right:1px solid #1f2937;
}

.sidebar h2{
    font-size:18px;
    margin-bottom:20px;
    color:#22c55e;
    letter-spacing:1px;
}

.nav-section{
    margin-bottom:25px;
}

.nav-title{
    font-size:12px;
    color:#9ca3af;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.nav-item{
    display:block;
    padding:10px 12px;
    margin-bottom:6px;
    border-radius:8px;
    color:#e5e7eb;
    text-decoration:none;
}

.nav-item:hover{
    background:rgba(255,255,255,0.08);
}

.active-page{
    background:#66ff00;
    color:#111827;
    font-weight:bold;
}

/* MAIN CONTENT - FIXED CENTERING */
.main{
    margin-left:260px;
    width:calc(100% - 260px);
    min-height:100vh;

    display:flex;
    flex-direction:column;   /* IMPORTANT: stack vertically */
    align-items:center;

    text-align:center;
    padding:10px;
}
.welcome-box h1{
    font-size:40px;
    margin-bottom:12px;
}

.welcome-box p{
    color:#9ca3af;
    font-size:16px;
}

.highlight{
    color:#22c55e;
}

.tool-grid{
    display:flex;
    gap:20px;
    margin-top:40px;
    justify-content:center;
    flex-wrap:wrap;
}

.tool-card{
    width:260px;
    background:#111827;
    border-radius:12px;
    overflow:hidden;
    text-decoration:none;
    color:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    transition:0.2s;
}

.tool-card:hover{
    transform:scale(1.03);
}

.tool-card img{
    width:100%;
    height:150px;
    object-fit:cover;
    display:block;
}

.tool-title{
    padding:12px;
    font-size:16px;
    text-align:center;
    background:#0f172a;
}




/* EACH CARD */
.card{
    width:340px;
    text-decoration:none;
    color:white;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:12px;
    overflow:hidden;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
}

.card-title{
    padding:12px;
    text-align:center;
    font-weight:bold;
    color:#e5e7eb;
}


.recent-label{
    margin-top:30px;
    margin-bottom:0px;
    font-size:25px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:cyan;
    font-weight:bold;
}

.card-row{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:50px;
    margin-bottom:80px;
}

img, input, button {
    max-width:100%;
}


@media (max-width: 768px){

    /* SIDEBAR */
    .sidebar{
        display:none;
    }

    /* MAIN LAYOUT */
    .main{
        margin-left:0;
        width:100%;
        padding:10px;
    }

    /* CALCULATOR */
    .calculator{
        width:95%;
    }

    /* HOMEPAGE */
    .welcome-box{
        width:100%;
        padding:10px 0;
        text-align:center;
    }

    .welcome-box h1{
        font-size:28px;
        margin-bottom:10px;
    }

    .welcome-box p{
        font-size:14px;
        padding:0 10px;
    }
}
