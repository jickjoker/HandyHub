    <meta charset="UTF-8">

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

body {
    background:black;
    color:white;
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
overflow-y: auto;
scrollbar-width: thin;
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#111827;
    padding:20px;
    border-right:1px solid #1f2937;
}

.sidebar h2{
    color:#22c55e;
    margin-bottom:30px;
}

.nav-title{
    font-size:12px;
    color:#9ca3af;
    margin-bottom:10px;
    text-transform:uppercase;
}

.nav-item{
    display:block;
    padding:10px 12px;
    margin-bottom:6px;
    border-radius:8px;
    color:#e5e7eb;
    text-decoration:none;
}

.nav-item:hover{
    background:rgba(255,255,255,0.08);
}

.nav-item.active-page{
    background:#66ff00;
    color:#111827 !important;
    font-weight:bold;
}

/* MAIN */
.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:40px;

    display:flex;
    flex-direction:column;

    align-items:center;       /* keeps layout centered */
    justify-content:flex-start;
    text-align:center;
}

.main h1{
    font-size:28px;
    font-weight:700;
    margin-bottom:8px;
}

.main p{
    color:#9ca3af;
    margin-bottom:30px;
}

/* CARDS */
.grid{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
	margin-top:60px;
}


.card-img{
    width:70%;
    max-height:120px;
    object-fit:contain;
    display:block;
    margin:10px auto;
}

.card{
    width:260px;
    background:#111827;
    border-radius:12px;
    padding:20px;
    text-decoration:none;
    color:white;
    border:1px solid #1f2937;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card-title{
    font-size:15px;
    font-weight:600;
    text-align:center;
}

.card-desc{
    font-size:13px;
    color:#9ca3af;
    margin-top:8px;
}


@media (max-width: 768px) {
    /* 1. Stack the body elements vertically instead of horizontally */
    body {
        flex-direction: column;
        min-height: auto;
    }

    /* 2. Reset the sidebar from fixed to standard block layout */
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #1f2937;
        padding: 20px;
    }

    /* 3. Let the main content take up full width below the sidebar */
    .main {
        margin-left: 0;
        width: 100%;
        padding: 30px 20px;
    }

    /* 4. Let cards expand or stack nicely on smaller screens */
    .grid {
        margin-top: 30px;
        width: 100%;
    }

    .card {
        width: 100%;
        max-width: 320px; /* Prevents cards from getting too wide */
    }
}

    </style>
</head>

<body>

<div class="nav-section">

</div>
    
</div>

</div>
